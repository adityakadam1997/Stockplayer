mode: backtest                # backtest | paper | live (only backtest used for now)
timezone: Asia/Kolkata

data:
  interval_minutes: 5
  lookback_months: 12         # fetch as much as the API allows, target 12+
  cache_dir: cache/
  instrument_exchange: NSE_EQ # Upstox segment for watchlist symbols
  request_chunk_days: 28      # days per historical API request (paged backwards); Upstox V3 rejects windows wider than ~28 days for minute candles with UDAPI1148 "Invalid date range"
  request_sleep_seconds: 0.35 # sleep between requests to respect rate limits
  max_retries: 5              # retries on HTTP 429 with exponential backoff

watchlist:
  - RELIANCE
  - HDFCBANK
  - ICICIBANK
  - INFY
  - TCS
  - SBIN
  - TATAMOTORS
  - TATASTEEL
  - AXISBANK
  - KOTAKBANK
  - LT
  - BHARTIARTL
  - MARUTI
  - BAJFINANCE
  - HINDUNILVR
