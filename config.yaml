mode: backtest                # backtest | paper | live (only backtest used for now)
timezone: Asia/Kolkata

data:
  interval_minutes: 5
  lookback_months: 12         # fetch as much as the API allows, target 12+
  cache_dir: cache/
  instrument_exchange: NSE_EQ # Upstox segment for watchlist symbols
  request_chunk_days: 28      # days per historical API request (paged backwards); Upstox V3 rejects windows wider than ~28 days for minute candles with UDAPI1148 "Invalid date range"
  request_sleep_seconds: 0.35 # sleep between requests to respect rate limits
  max_retries: 5              # retries on HTTP 429 with exponential backoff

signals:
  deviation_bands: [1, 2]     # which std-dev multiples to compute
  acceptance_candles: 3       # consecutive candles required for "accepted"
  value_area_band: 1          # which band defines the value area boundary

strategy:
  min_rr: 1.5                       # every trade must clear this reward:risk at entry or it is skipped
  stop_buffer_pct: 0.0005           # stop placed this fraction beyond the reference wick/band (0.05%)
  setup2_min_vwap_crossings: 2      # balance/rotation filter: vwap crossings so far this session
  setup3_allow_fallback: false      # also take the aggressive break-back-inside entry, flagged separately
  setup4_vwap_touch_tolerance_pct: 0.0005   # how close to vwap counts as a "touch" (0.05%)
  wide_band_guard_pct: 0.015        # suppress setups 2 & 4 when band_upper_1-band_lower_1 exceeds this fraction of price
  session_open_no_entry_minutes: 15 # no entries in the first N minutes of the session (09:15-09:30)
  no_entry_after: "14:45"           # no new entries after this IST time
  square_off_at: "15:15"            # force-close all open positions at this IST time

  # Weekend 4: stop floor -- final stop distance = max(structural stop distance,
  # stop_floor_pct * entry_price, atr_mult * ATR20). Only ever widens the stop.
  stop_floor_pct: 0.0035
  atr_mult: 1.0

  # Weekend 4: skip a proposal if its estimated full round-trip cost exceeds
  # this fraction of the nominal rupee risk on the trade (at the position
  # size the floored stop implies).
  cost_viability_max_pct: 0.15

  # Weekend 4: frequency discipline (enforced by the simulator).
  max_trades_per_day: 2         # per symbol per day, all setups combined
  stop_cooldown_minutes: 30     # after a stop-out in a symbol, before a new entry in that symbol

costs:
  brokerage_per_order: 20.0   # flat ₹ per executed order (entry + exit = 2 orders)
  stt_sell_pct: 0.00025       # STT on intraday equity, sell side only
  txn_charge_pct: 0.00005     # exchange txn charges + SEBI fees + stamp duty, bundled, per side
  gst_pct: 0.18                # GST on (brokerage + transaction charges)
  slippage_ticks: 1            # tick-based slippage component
  tick_size: 0.05
  slippage_pct: 0.0002         # percentage-based slippage component; effective slippage = max(ticks*tick_size, price*pct)
  stop_slippage_pct: 0.0005    # stop-loss fills specifically slip this much worse (fast markets)

backtest:
  capital: 100000.0     # starting capital per the sizing formula
  risk_pct: 0.005        # fraction of capital risked per trade

# Cycle 2 (Weekend 5): the identical VWAP Wave system re-tested on 15-min
# bars. The 5-min profile above (data/signals/strategy) is left untouched for
# reproducibility of the Weekend 3/4 runs -- ``timeframes.<name>`` sections
# below only list the deltas from it; everything not listed here (targets,
# setup detector logic, R:R threshold, risk_pct, capital, wide-band guard,
# stop-floor/cost-viability/frequency-discipline formulas and thresholds) is
# inherited unchanged. Select a profile with scripts/run_backtest.py --timeframe.
timeframes:
  15min:
    data:
      interval_minutes: 15
    signals:
      acceptance_candles: 2          # 2 x 15min = 30 min of acceptance (was 3 x 5min = 15 min)
    strategy:
      session_open_no_entry_minutes: 30   # first two 15-min bars: 09:15-09:45 (was 09:15-09:30)
      no_entry_after: "14:30"             # last entry (was 14:45)
      # square_off_at, stop_floor_pct, atr_mult, cost_viability_max_pct,
      # max_trades_per_day, stop_cooldown_minutes, min_rr, wide_band_guard_pct:
      # unchanged, inherited from strategy: above. ATR20 is naturally larger
      # on 15-min bars even with an unchanged atr_mult.

  # Cycle 3: the identical VWAP Wave setups on daily bars (weekly-anchored
  # bands, monthly-anchored trend filter), swing-holding 2-10 days, cash
  # DELIVERY settlement -- a different cost model (costs_delivery: below),
  # different capital/risk-per-trade, wider stops. min_rr, cost_viability_max_pct,
  # wide_band_guard_pct, stop_buffer_pct, setup2_min_vwap_crossings,
  # setup3_allow_fallback, setup4_vwap_touch_tolerance_pct: all unchanged,
  # inherited from strategy: above. No entry-window/square-off/max-trades-
  # per-day/cooldown concepts -- those are intraday-only; swing_portfolio:
  # below has the real analogues (time-stop, concurrent-position caps).
  swing:
    data:
      interval_minutes: 1440   # daily bars; cache/<SYMBOL>_1d.parquet (interval_label override, not this value)
    signals:
      acceptance_candles: 2    # two daily closes outside value (was 3 candles intraday)
    strategy:
      stop_floor_pct: 0.025    # 2.5% of price (was 0.35%)
      atr_mult: 1.5            # 1.5 x ATR14 on daily bars (was 1.0 x ATR20)
    backtest:
      capital: 300000.0        # was 100000.0
      risk_pct: 0.01           # 1% of capital = Rs 3,000/trade (was 0.5%)

# Cycle 3: cash-DELIVERY equity cost model -- see backtest/costs_delivery.py
# for sourcing notes on every figure (Upstox's own site is blocked by this
# environment's egress policy; verified via >=2 independent secondary
# sources instead, flagged prominently in the PR).
costs_delivery:
  brokerage_per_order: 0.0    # Upstox charges no brokerage on delivery-based equity trades
  stt_pct: 0.001               # 0.1% STT, BOTH legs (delivery; SEBI-mandated)
  txn_charge_pct: 0.0000325    # 0.00325% NSE exchange transaction charge, both legs
  sebi_fee_pct: 0.000001       # 0.0001% (Rs 10/crore) SEBI turnover fee, both legs
  stamp_duty_pct: 0.00015      # 0.015% stamp duty, buy leg only
  dp_charge_rs: 20.0           # flat Rs 20 (+ GST) DP charge, sell leg only, per scrip per day
  gst_pct: 0.18                # on (brokerage + transaction charges + SEBI fee + DP charges)
  slippage_pct: 0.0003         # 0.03% per side ("limit-ish patience" delivery entries/exits)

# Cycle 3 portfolio-level execution rules (backtest.swing_simulator) -- these
# have no intraday analogue (no per-day trade cap/cooldown; multi-day holds
# with a hard time-stop and portfolio-wide concurrency caps instead).
swing_portfolio:
  time_stop_days: 10            # force-exit at close if neither stop nor target hit within N trading days
  max_concurrent_positions: 5   # portfolio-wide, across all symbols
  max_positions_per_symbol: 1

watchlist:
  - RELIANCE
  - HDFCBANK
  - ICICIBANK
  - INFY
  - TCS
  - SBIN
  - TATAMOTORS
  - TATASTEEL
  - AXISBANK
  - KOTAKBANK
  - LT
  - BHARTIARTL
  - MARUTI
  - BAJFINANCE
  - HINDUNILVR
